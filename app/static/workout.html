<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout — GymLog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: system-ui, sans-serif;
      padding: 24px 16px 48px;
      max-width: 600px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-block;
      color: #666;
      font-size: 0.85rem;
      text-decoration: none;
      margin-bottom: 20px;
    }
    .back-link:hover { color: #aaa; }

    .workout-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 28px;
    }

    h1 { font-size: 1.5rem; font-weight: 700; }
    .workout-meta { font-size: 0.82rem; color: #555; margin-top: 4px; }

    .btn-delete {
      background: none;
      border: 1px solid #3a2020;
      border-radius: 6px;
      color: #8a4a4a;
      font-size: 0.8rem;
      padding: 6px 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-delete:hover { border-color: #6a2a2a; color: #cf6f6f; }

    .exercise-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .exercise-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .exercise-name {
      font-size: 1rem;
      font-weight: 600;
    }

    .progression-link {
      font-size: 0.78rem;
      color: #5a9cf5;
      text-decoration: none;
    }
    .progression-link:hover { color: #8abbff; }

    .muscle-tag {
      display: inline-block;
      background: #252525;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      color: #888;
      font-size: 0.72rem;
      padding: 2px 7px;
      margin-top: 4px;
    }

    .sets-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    .sets-table th {
      font-size: 0.72rem;
      color: #555;
      text-align: left;
      padding-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .sets-table td {
      font-size: 0.88rem;
      color: #bbb;
      padding: 5px 0;
      border-top: 1px solid #222;
    }

    .sets-table td:first-child { color: #555; width: 40px; }

    .summary-row {
      display: flex;
      gap: 20px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #222;
    }

    .summary-item { font-size: 0.78rem; color: #555; }
    .summary-item b { color: #888; }

    #loading { color: #555; font-size: 0.9rem; padding: 20px 0; }

    .confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .confirm-overlay.open { display: flex; }

    .confirm-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 24px;
      width: 280px;
      text-align: center;
    }
    .confirm-box p { font-size: 0.9rem; color: #aaa; margin-bottom: 20px; }
    .confirm-actions { display: flex; gap: 10px; }
    .confirm-actions button { flex: 1; padding: 10px; border-radius: 7px; cursor: pointer; font-size: 0.9rem; }
    .btn-cancel { background: none; border: 1px solid #333; color: #888; }
    .btn-confirm-delete { background: #3a1a1a; border: 1px solid #6a2a2a; color: #cf6f6f; }
    .btn-confirm-delete:hover { background: #4a2020; }
  </style>
</head>
<body>
  <a class="back-link" href="/workouts">← Workouts</a>

  <div id="loading">Loading…</div>

  <div id="content" style="display:none">
    <div class="workout-header">
      <div>
        <h1 id="workout-date"></h1>
        <p class="workout-meta" id="workout-meta"></p>
      </div>
      <button class="btn-delete" onclick="confirmDelete()">Delete</button>
    </div>

    <div id="exercises"></div>
  </div>

  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <p>Delete this workout? This can't be undone.</p>
      <div class="confirm-actions">
        <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
        <button class="btn-confirm-delete" onclick="deleteWorkout()">Delete</button>
      </div>
    </div>
  </div>

  <script>
    const sessionId = window.location.pathname.split('/').filter(Boolean).pop();

    async function load() {
      const res = await fetch(`/api/workout/${sessionId}`);
      if (!res.ok) {
        document.getElementById('loading').textContent = 'Workout not found.';
        return;
      }
      const workout = await res.json();

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';

      const date = new Date(workout.logged_at);
      document.title = `${date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} — GymLog`;
      document.getElementById('workout-date').textContent = date.toLocaleDateString('en-US', {
        weekday: 'long', month: 'long', day: 'numeric', year: 'numeric',
      });

      const totalSets = workout.exercises.reduce((n, e) => n + e.sets.length, 0);
      document.getElementById('workout-meta').textContent =
        `${workout.exercises.length} exercise${workout.exercises.length !== 1 ? 's' : ''} · ${totalSets} sets`;

      const container = document.getElementById('exercises');
      container.innerHTML = workout.exercises.map(ex => {
        const progressionLink = ex.exercise_id
          ? `<a class="progression-link" href="/exercise/${ex.exercise_id}">View progression →</a>`
          : '';

        const setsHtml = ex.sets.map((s, i) => {
          const weight = s.weight_lbs != null ? `${s.weight_lbs} lbs` : 'bodyweight';
          return `<tr>
            <td>${i + 1}</td>
            <td>${s.reps} reps</td>
            <td>${weight}</td>
          </tr>`;
        }).join('');

        const weights = ex.sets.map(s => s.weight_lbs).filter(w => w != null);
        const volume = weights.length > 0
          ? ex.sets.reduce((sum, s) => sum + (s.weight_lbs != null ? s.reps * s.weight_lbs : 0), 0)
          : null;
        const bestWeight = weights.length > 0 ? Math.max(...weights) : null;

        const summaryHtml = [
          volume != null ? `<div class="summary-item">Vol <b>${volume.toLocaleString()} lbs</b></div>` : '',
          bestWeight != null ? `<div class="summary-item">Best <b>${bestWeight} lbs</b></div>` : '',
          `<div class="summary-item">Sets <b>${ex.sets.length}</b></div>`,
        ].filter(Boolean).join('');

        return `<div class="exercise-card">
          <div class="exercise-card-header">
            <div>
              <div class="exercise-name">${ex.name}</div>
              <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;">
                ${ex.muscle_groups.map(mg => `<span class="muscle-tag">${mg.name}</span>`).join('')}
              </div>
            </div>
            ${progressionLink}
          </div>
          <table class="sets-table">
            <thead><tr><th>Set</th><th>Reps</th><th>Weight</th></tr></thead>
            <tbody>${setsHtml}</tbody>
          </table>
          <div class="summary-row">${summaryHtml}</div>
        </div>`;
      }).join('');
    }

    function confirmDelete() {
      document.getElementById('confirm-overlay').classList.add('open');
    }

    function closeConfirm() {
      document.getElementById('confirm-overlay').classList.remove('open');
    }

    async function deleteWorkout() {
      const res = await fetch(`/api/workout/${sessionId}`, { method: 'DELETE' });
      if (res.ok) window.location.href = '/workouts';
    }

    load();
  </script>
</body>
</html>
